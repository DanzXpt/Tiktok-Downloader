<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0050">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
  color:white;
  padding:20px;
}

.container{
  max-width:420px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

h1{
  text-align:center;
  color:#ff0050;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-main{background:#ff0050;color:white}

video{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.item{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.btn-row{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.btn-green{background:#00c853;color:white}
.btn-blue{background:#2196f3;color:white}
.btn-red{background:#d50000;color:white}

.spinner{
  display:none;
  margin:10px auto;
  border:4px solid #333;
  border-top:4px solid #ff0050;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="container">
  <h1>TikTok DL Pro</h1>

  <input id="link" placeholder="Paste link TikTok...">
  <button class="btn-main" onclick="downloadVideo()">Download</button>

  <div class="spinner" id="loading"></div>

  <div id="result"></div>

  <h3 style="margin-top:20px;">Riwayat</h3>
  <div id="history"></div>
</div>

<script>
let historyData = JSON.parse(localStorage.getItem("tt_history")) || [];

const APIs = [
  url => `https://api.tiklydown.me/api/download?url=${url}`,
  url => `https://tikwm.com/api/?url=${url}`
];

function saveHistory(video){
  historyData.unshift(video);
  if(historyData.length > 10) historyData.pop();
  localStorage.setItem("tt_history", JSON.stringify(historyData));
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById("history");
  el.innerHTML = "";

  historyData.forEach(v=>{
    el.innerHTML += `
      <div class="item">
        <video controls src="${v}"></video>

        <div class="btn-row">
          <button class="btn-green" onclick="download('${v}')">Download Lagi</button>
          <button class="btn-blue" onclick="copy('${v}')">Copy Link</button>
        </div>
      </div>
    `;
  });
}

function copy(url){
  navigator.clipboard.writeText(url);
  alert("Link disalin");
}

function download(url){
  const a = document.createElement("a");
  a.href = url;
  a.download = "tiktok.mp4";
  a.click();
}

async function downloadVideo(){
  const url = document.getElementById("link").value;
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  if(!url.includes("tiktok")){
    alert("Link tidak valid");
    return;
  }

  loading.style.display="block";
  result.innerHTML="";

  let video = null;

  for(let api of APIs){
    try{
      let res = await fetch(api(encodeURIComponent(url)));
      let data = await res.json();

      video = data?.video?.noWatermark || data?.data?.play;
      if(video) break;
    }catch(e){}
  }

  loading.style.display="none";

  if(!video){
    result.innerHTML="Gagal ambil video";
    return;
  }

  result.innerHTML = `
    <video controls src="${video}"></video>
    <button class="btn-green" onclick="download('${video}')">Download</button>
  `;

  saveHistory(video);
}

renderHistory();

// register SW
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
